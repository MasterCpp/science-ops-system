services:
  mysql:
    image: mysql:8.4
    container_name: science-ops-mysql
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-science_ops}
      MYSQL_USER: ${MYSQL_USER:-science_ops}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-science_ops_dev}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_dev}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ./server
    container_name: science-ops-server
    environment:
      SERVER_PORT: 8080
      LOCAL_FILE_STORAGE_PATH: /app/storage
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-science_ops}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-science_ops}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-science_ops_dev}
    ports:
      - "${SERVER_PORT:-8080}:8080"
    volumes:
      - ${LOCAL_FILE_STORAGE_PATH:-./storage}:/app/storage
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: science-ops-nginx
    ports:
      - "${NGINX_PORT:-8088}:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./apps/admin-web/dist:/usr/share/nginx/html/admin:ro
      - ./apps/mobile-web/dist:/usr/share/nginx/html/mobile:ro
    depends_on:
      - server

volumes:
  mysql-data:
