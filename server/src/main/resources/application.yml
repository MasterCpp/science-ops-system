server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: science-ops-server
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:science_ops;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: false

mybatis-plus:
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

science-ops:
  storage:
    local-path: ${LOCAL_FILE_STORAGE_PATH:./storage}
  security:
    jwt-secret: ${JWT_SECRET:dev-secret-change-me-please-use-at-least-32-chars}
    jwt-ttl-minutes: ${JWT_TTL_MINUTES:120}
